<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512">
  <!-- Concept 2: Circular Emblem / Badge — We The Farm -->

  <!-- ============================================= -->
  <!-- ICON: Circular badge with sprout/seedling     -->
  <!-- ============================================= -->
  <g id="icon" transform="translate(200, 256)">

    <!-- Outer wobbly circle border — hand-drawn feel -->
    <path d="
      M 0,-170
      C 45,-172  90,-168  130,-130
      C 168,-92  172,-46  170,0
      C 172,48  166,94  130,130
      C 92,168  46,174  0,170
      C -47,173 -93,167 -130,130
      C -169,93 -173,47 -170,0
      C -174,-48 -167,-93 -130,-130
      C -93,-169 -47,-174  0,-170
      Z
    " fill="#3B4A2B" />

    <!-- Inner wobbly circle — cream background -->
    <path d="
      M 0,-148
      C 40,-150  80,-146  114,-114
      C 147,-81  150,-40  148,0
      C 150,42  146,82  114,114
      C 81,147  41,151  0,148
      C -42,150 -82,146 -114,114
      C -147,82 -151,42 -148,0
      C -151,-41 -146,-81 -114,-114
      C -81,-147 -41,-151  0,-148
      Z
    " fill="#FAF3E3" />

    <!-- Decorative dots around inner rim -->
    <circle cx="0" cy="-134" r="4" fill="#D4A130" />
    <circle cx="67" cy="-116" r="3.5" fill="#D4A130" />
    <circle cx="116" cy="-67" r="3.5" fill="#D4A130" />
    <circle cx="134" cy="0" r="4" fill="#D4A130" />
    <circle cx="116" cy="67" r="3.5" fill="#D4A130" />
    <circle cx="67" cy="116" r="3.5" fill="#D4A130" />
    <circle cx="0" cy="134" r="4" fill="#D4A130" />
    <circle cx="-67" cy="116" r="3.5" fill="#D4A130" />
    <circle cx="-116" cy="67" r="3.5" fill="#D4A130" />
    <circle cx="-134" cy="0" r="4" fill="#D4A130" />
    <circle cx="-116" cy="-67" r="3.5" fill="#D4A130" />
    <circle cx="-67" cy="-116" r="3.5" fill="#D4A130" />

    <!-- Soil mound — organic rounded shape -->
    <path d="
      M -80,52
      C -72,32 -40,18 0,14
      C 40,18 72,32 80,52
      C 82,58 80,68 76,74
      L -76,74
      C -80,68 -82,58 -80,52
      Z
    " fill="#2C1D10" />

    <!-- Soil texture — lighter earth spots -->
    <circle cx="-40" cy="52" r="5" fill="#4A3420" opacity="0.6" />
    <circle cx="20" cy="58" r="4" fill="#4A3420" opacity="0.5" />
    <circle cx="50" cy="48" r="3.5" fill="#4A3420" opacity="0.5" />
    <circle cx="-15" cy="44" r="3" fill="#4A3420" opacity="0.4" />
    <circle cx="35" cy="64" r="4" fill="#4A3420" opacity="0.4" />

    <!-- Roots below soil — visible through a little cutaway -->
    <path d="
      M 0,52
      C -2,62 -8,72 -14,82
      C -16,86 -20,94 -24,98
    " fill="none" stroke="#D05E3A" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
    <path d="
      M 0,52
      C 3,64 6,76 4,86
      C 3,92 6,96 10,100
    " fill="none" stroke="#D05E3A" stroke-width="2" stroke-linecap="round" opacity="0.6" />
    <path d="
      M 0,52
      C -1,58 -4,66 -2,74
      C 0,80 -6,88 -4,96
    " fill="none" stroke="#D05E3A" stroke-width="1.8" stroke-linecap="round" opacity="0.5" />

    <!-- Tiny root hairs -->
    <path d="M -14,82 C -18,84 -22,82 -26,84" fill="none" stroke="#D05E3A" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
    <path d="M 4,86 C 8,88 12,86 16,90" fill="none" stroke="#D05E3A" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />
    <path d="M -24,98 C -28,100 -32,98 -34,102" fill="none" stroke="#D05E3A" stroke-width="1.2" stroke-linecap="round" opacity="0.4" />

    <!-- Main stem — slightly wobbly -->
    <path d="
      M 0,14
      C -1,4 1,-10 -2,-24
      C -3,-36 0,-50 2,-68
    " fill="none" stroke="#3B4A2B" stroke-width="5" stroke-linecap="round" />

    <!-- Left leaf — big, rounded, cute -->
    <path d="
      M -2,-34
      C -14,-48 -38,-56 -52,-44
      C -62,-36 -56,-18 -38,-16
      C -24,-14 -10,-22 -2,-34
      Z
    " fill="#3B4A2B" />
    <!-- Left leaf vein -->
    <path d="M -2,-34 C -16,-38 -30,-36 -44,-30" fill="none" stroke="#FAF3E3" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />

    <!-- Right leaf — slightly different shape for organic feel -->
    <path d="
      M 0,-52
      C 14,-66 40,-72 52,-60
      C 60,-50 52,-34 36,-30
      C 22,-28 8,-38 0,-52
      Z
    " fill="#3B4A2B" />
    <!-- Right leaf vein -->
    <path d="M 0,-52 C 16,-56 30,-54 42,-46" fill="none" stroke="#FAF3E3" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />

    <!-- Top tiny sprouting leaves — cute unfurling -->
    <path d="
      M 2,-68
      C -4,-80 -16,-88 -20,-82
      C -22,-78 -14,-72 -6,-70
      C -2,-69 0,-68 2,-68
      Z
    " fill="#D4A130" />
    <path d="
      M 2,-68
      C 8,-82 18,-86 22,-80
      C 24,-76 18,-70 10,-68
      C 6,-67 4,-68 2,-68
      Z
    " fill="#EBC85B" />

    <!-- Tiny sparkle/dewdrop on leaf -->
    <circle cx="-36" cy="-32" r="3" fill="#FAF3E3" opacity="0.7" />
    <circle cx="38" cy="-46" r="2.5" fill="#FAF3E3" opacity="0.6" />

    <!-- Text curved along top of circle: "EST. 2024" -->
    <path id="topArc" d="M -90,-100 C -60,-132 60,-132 90,-100" fill="none" />
    <text font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#3B4A2B" letter-spacing="3" font-weight="bold">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">SINGAPORE</textPath>
    </text>

    <!-- Text curved along bottom: "ROOFTOP FARM" -->
    <path id="bottomArc" d="M -90,110 C -60,140 60,140 90,110" fill="none" />
    <text font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#3B4A2B" letter-spacing="2.5" font-weight="bold">
      <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">ROOFTOP FARM</textPath>
    </text>

    <!-- Small stars/decorative elements flanking bottom text -->
    <path d="M -60,100 L -56,104 L -60,108 L -64,104 Z" fill="#D4A130" />
    <path d="M 60,100 L 64,104 L 60,108 L 56,104 Z" fill="#D4A130" />

  </g>

  <!-- ============================================= -->
  <!-- WORDMARK: "We The Farm" on the right          -->
  <!-- ============================================= -->
  <g id="wordmark" transform="translate(460, 200)">

    <!-- "We The" — smaller, stacked above -->
    <text
      x="0" y="0"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="42"
      font-weight="bold"
      fill="#3B4A2B"
      letter-spacing="6"
    >We The</text>

    <!-- "Farm" — large, warm, dominant -->
    <text
      x="0" y="72"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="80"
      font-weight="bold"
      fill="#3B4A2B"
      letter-spacing="4"
    >Farm</text>

    <!-- Decorative underline — hand-drawn wobbly stroke -->
    <path d="
      M 0,90
      C 30,92 80,86 140,90
      C 200,94 260,88 310,90
    " fill="none" stroke="#D05E3A" stroke-width="3.5" stroke-linecap="round" />

    <!-- Small leaf accent after "Farm" -->
    <path d="
      M 296,58
      C 304,48 318,44 324,50
      C 328,54 322,62 314,64
      C 308,65 302,62 296,58
      Z
    " fill="#D4A130" />

  </g>

  <!-- ============================================= -->
  <!-- TAGLINE: "Compost. Grow. Share."              -->
  <!-- ============================================= -->
  <g id="tagline" transform="translate(460, 316)">
    <text
      x="0" y="0"
      font-family="Helvetica, Arial, sans-serif"
      font-size="20"
      fill="#D05E3A"
      letter-spacing="4"
      font-weight="normal"
    >Compost. Grow. Share.</text>
  </g>

</svg>
