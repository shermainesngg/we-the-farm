<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512">
  <!-- We The Farm — Rooftop Garden Concept -->

  <!-- Background (transparent by default; cream rect for preview) -->

  <!-- === ICON GROUP (left ~40%) === -->
  <g id="icon" transform="translate(60, 40)">

    <!-- Tiny sun peeking from top-right -->
    <g id="sun">
      <circle cx="310" cy="62" r="30" fill="#D4A130"/>
      <!-- rays -->
      <line x1="310" y1="26" x2="310" y2="14" stroke="#EBC85B" stroke-width="5" stroke-linecap="round"/>
      <line x1="340" y1="38" x2="348" y2="28" stroke="#EBC85B" stroke-width="5" stroke-linecap="round"/>
      <line x1="344" y1="62" x2="358" y2="62" stroke="#EBC85B" stroke-width="5" stroke-linecap="round"/>
      <line x1="340" y1="86" x2="348" y2="96" stroke="#EBC85B" stroke-width="5" stroke-linecap="round"/>
      <line x1="280" y1="38" x2="272" y2="28" stroke="#EBC85B" stroke-width="5" stroke-linecap="round"/>
      <line x1="276" y1="62" x2="262" y2="62" stroke="#EBC85B" stroke-width="5" stroke-linecap="round"/>
    </g>

    <!-- Building body — cute, slightly rounded, geometric -->
    <g id="building">
      <!-- Main building block -->
      <rect x="60" y="200" width="240" height="190" rx="8" ry="8" fill="#D05E3A"/>
      <!-- Slightly darker facade accent -->
      <rect x="60" y="340" width="240" height="50" rx="0" ry="0" fill="#B94E2E"/>
      <!-- rounded bottom -->
      <rect x="60" y="375" width="240" height="18" rx="8" ry="8" fill="#B94E2E"/>

      <!-- Door -->
      <rect x="148" y="310" width="64" height="83" rx="32" ry="32" fill="#2C1D10"/>
      <circle cx="200" cy="355" r="4" fill="#D4A130"/>

      <!-- Windows row 1 -->
      <rect x="90" y="228" width="42" height="42" rx="6" fill="#EBC85B"/>
      <rect x="159" y="228" width="42" height="42" rx="6" fill="#EBC85B"/>
      <rect x="228" y="228" width="42" height="42" rx="6" fill="#EBC85B"/>
      <!-- Window crosses -->
      <line x1="111" y1="228" x2="111" y2="270" stroke="#D4A130" stroke-width="3"/>
      <line x1="90" y1="249" x2="132" y2="249" stroke="#D4A130" stroke-width="3"/>
      <line x1="180" y1="228" x2="180" y2="270" stroke="#D4A130" stroke-width="3"/>
      <line x1="159" y1="249" x2="201" y2="249" stroke="#D4A130" stroke-width="3"/>
      <line x1="249" y1="228" x2="249" y2="270" stroke="#D4A130" stroke-width="3"/>
      <line x1="228" y1="249" x2="270" y2="249" stroke="#D4A130" stroke-width="3"/>

      <!-- Windows row 2 (flanking door) -->
      <rect x="90" y="310" width="42" height="42" rx="6" fill="#EBC85B"/>
      <rect x="228" y="310" width="42" height="42" rx="6" fill="#EBC85B"/>
      <line x1="111" y1="310" x2="111" y2="352" stroke="#D4A130" stroke-width="3"/>
      <line x1="90" y1="331" x2="132" y2="331" stroke="#D4A130" stroke-width="3"/>
      <line x1="249" y1="310" x2="249" y2="352" stroke="#D4A130" stroke-width="3"/>
      <line x1="228" y1="331" x2="270" y2="331" stroke="#D4A130" stroke-width="3"/>
    </g>

    <!-- Rooftop green area — lush, overflowing -->
    <g id="rooftop-garden">
      <!-- Green rooftop base / soil bed -->
      <rect x="45" y="188" width="270" height="22" rx="11" ry="11" fill="#3B4A2B"/>
      <!-- Soil edge highlight -->
      <rect x="50" y="188" width="260" height="10" rx="5" ry="5" fill="#4A5C36"/>

      <!-- Grass / bush clusters — organic rounded shapes -->
      <ellipse cx="80" cy="185" rx="30" ry="18" fill="#4A5C36"/>
      <ellipse cx="120" cy="180" rx="25" ry="22" fill="#3B4A2B"/>
      <ellipse cx="160" cy="183" rx="28" ry="19" fill="#537A3A"/>
      <ellipse cx="205" cy="178" rx="32" ry="24" fill="#3B4A2B"/>
      <ellipse cx="245" cy="183" rx="26" ry="20" fill="#4A5C36"/>
      <ellipse cx="280" cy="186" rx="24" ry="16" fill="#537A3A"/>

      <!-- Taller foliage blobs -->
      <ellipse cx="100" cy="168" rx="18" ry="16" fill="#537A3A"/>
      <ellipse cx="190" cy="162" rx="22" ry="20" fill="#4A5C36"/>
      <ellipse cx="260" cy="170" rx="16" ry="14" fill="#3B4A2B"/>

      <!-- Cute tomato plant (left side) -->
      <g id="tomato-plant">
        <!-- Stem -->
        <path d="M95 170 Q92 148 98 130" stroke="#3B4A2B" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Leaves -->
        <ellipse cx="88" cy="148" rx="10" ry="6" fill="#537A3A" transform="rotate(-20 88 148)"/>
        <ellipse cx="104" cy="140" rx="9" ry="5" fill="#4A5C36" transform="rotate(15 104 140)"/>
        <!-- Tomato fruits -->
        <circle cx="98" cy="126" r="9" fill="#D05E3A"/>
        <circle cx="85" cy="134" r="7" fill="#D05E3A"/>
        <!-- Tiny tomato highlight -->
        <circle cx="95" cy="123" r="2.5" fill="#E8795E" opacity="0.6"/>
      </g>

      <!-- Cute carrot top (center-left) -->
      <g id="carrot">
        <path d="M150 178 L150 140" stroke="#3B4A2B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Feathery tops -->
        <path d="M150 145 Q140 130 135 120" stroke="#537A3A" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M150 145 Q152 128 150 115" stroke="#4A5C36" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M150 145 Q160 130 165 122" stroke="#537A3A" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Extra fronds -->
        <path d="M150 148 Q142 135 140 128" stroke="#3B4A2B" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M150 148 Q158 134 162 127" stroke="#3B4A2B" stroke-width="2" fill="none" stroke-linecap="round"/>
      </g>

      <!-- Big leafy plant (center) -->
      <g id="leafy-plant">
        <path d="M200 170 Q198 145 202 120" stroke="#3B4A2B" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Big rounded leaves -->
        <ellipse cx="188" cy="135" rx="16" ry="10" fill="#537A3A" transform="rotate(-30 188 135)"/>
        <ellipse cx="214" cy="130" rx="15" ry="9" fill="#4A5C36" transform="rotate(25 214 130)"/>
        <ellipse cx="196" cy="118" rx="14" ry="9" fill="#3B4A2B" transform="rotate(-15 196 118)"/>
        <ellipse cx="210" cy="114" rx="12" ry="8" fill="#537A3A" transform="rotate(20 210 114)"/>
        <!-- Tiny sprout at top -->
        <path d="M202 118 Q200 106 204 98" stroke="#537A3A" stroke-width="2" fill="none" stroke-linecap="round"/>
        <ellipse cx="206" cy="97" rx="6" ry="4" fill="#7CAA4E" transform="rotate(15 206 97)"/>
      </g>

      <!-- Small herb / basil (right) -->
      <g id="herb">
        <path d="M258 175 Q256 155 260 140" stroke="#3B4A2B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="252" cy="148" rx="8" ry="6" fill="#537A3A" transform="rotate(-25 252 148)"/>
        <ellipse cx="266" cy="144" rx="7" ry="5" fill="#4A5C36" transform="rotate(20 266 144)"/>
        <ellipse cx="258" cy="136" rx="7" ry="5" fill="#537A3A" transform="rotate(-10 258 136)"/>
      </g>

      <!-- Tiny cute sprout (far right, emerging from edge) -->
      <g id="tiny-sprout">
        <path d="M295 190 Q294 178 296 168" stroke="#537A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="290" cy="168" rx="6" ry="4" fill="#7CAA4E" transform="rotate(-30 290 168)"/>
        <ellipse cx="302" cy="166" rx="6" ry="4" fill="#537A3A" transform="rotate(25 302 166)"/>
      </g>

      <!-- Another tiny sprout (far left) -->
      <g id="tiny-sprout-left">
        <path d="M58 192 Q56 180 60 170" stroke="#4A5C36" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="54" cy="170" rx="6" ry="4" fill="#7CAA4E" transform="rotate(-35 54 170)"/>
        <ellipse cx="66" cy="168" rx="5" ry="4" fill="#537A3A" transform="rotate(30 66 168)"/>
      </g>
    </g>

    <!-- Tiny bee -->
    <g id="bee" transform="translate(310, 120)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="8" ry="6" fill="#EBC85B"/>
      <!-- Stripes -->
      <line x1="-3" y1="-6" x2="-3" y2="6" stroke="#2C1D10" stroke-width="2" stroke-linecap="round"/>
      <line x1="3" y1="-5" x2="3" y2="5" stroke="#2C1D10" stroke-width="2" stroke-linecap="round"/>
      <!-- Wings -->
      <ellipse cx="-4" cy="-8" rx="6" ry="4" fill="#FAF3E3" opacity="0.7" transform="rotate(-20 -4 -8)"/>
      <ellipse cx="4" cy="-8" rx="6" ry="4" fill="#FAF3E3" opacity="0.7" transform="rotate(20 4 -8)"/>
      <!-- Flight path (dotted) -->
      <path d="M-14 4 Q-24 -10 -30 0 Q-36 10 -46 -2" stroke="#2C1D10" stroke-width="1" fill="none" stroke-dasharray="2 3" opacity="0.3"/>
    </g>

    <!-- Tiny floating leaf accent -->
    <g id="leaf-accent" transform="translate(40, 110)">
      <path d="M0 0 Q8 -8 16 0 Q8 8 0 0 Z" fill="#537A3A" transform="rotate(-30)"/>
      <line x1="8" y1="0" x2="2" y2="5" stroke="#3B4A2B" stroke-width="1" opacity="0.5"/>
    </g>

  </g>

  <!-- === WORDMARK GROUP (right ~60%) === -->
  <g id="wordmark" transform="translate(460, 0)">

    <!-- "We The Farm" main text -->
    <!-- Using system serif font for warm, organic feel -->
    <text x="30" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="#3B4A2B" letter-spacing="2">
      <tspan>We The</tspan>
    </text>
    <text x="30" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="#3B4A2B" letter-spacing="2">
      <tspan>Farm</tspan>
    </text>

    <!-- Decorative underline / accent stroke -->
    <path d="M30 338 Q140 348 260 336" stroke="#D05E3A" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Tagline -->
    <g id="tagline">
      <text x="34" y="375" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#D4A130" letter-spacing="5" font-weight="normal">
        Compost. Grow. Share.
      </text>
    </g>

    <!-- Small decorative leaf next to wordmark -->
    <g transform="translate(300, 300)">
      <path d="M0 0 Q10 -14 24 -8 Q14 2 0 0 Z" fill="#537A3A"/>
      <path d="M12 -4 Q6 -1 0 0" stroke="#3B4A2B" stroke-width="1" fill="none"/>
    </g>

  </g>

</svg>