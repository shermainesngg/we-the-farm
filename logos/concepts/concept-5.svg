<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512">
  <!--
    We The Farm — Concept 5: Three Leaves / Community Symbol
    Three overlapping organic leaves in a pinwheel trefoil.
    Three founders. Three pillars: Compost, Grow, Share.
  -->

  <!-- === ICON: Three-leaf pinwheel trefoil === -->
  <g id="icon" transform="translate(160, 252) scale(1.18)">

    <!--
      Broad organic leaf shapes, rotated 120-degrees apart.
      Each leaf is individually shaped to appear visually equal
      after rotation (compensating for asymmetric curve).
      Gentle clockwise pinwheel spin from the leaf curvature.
    -->

    <!-- LEAF 1: Forest Green — upper-left -->
    <g transform="rotate(-30, 0, 0)">
      <path d="M0,-4
               C-14,-18 -28,-50 -34,-78
               C-38,-98 -38,-120 -32,-136
               C-26,-146 -18,-150 -8,-144
               C0,-138 8,-122 14,-104
               C20,-80 22,-54 18,-34
               C14,-20 8,-10 0,-4Z"
            fill="#3B4A2B"/>
      <path d="M-2,-12 C-12,-32 -24,-62 -30,-90 C-34,-106 -34,-124 -28,-138"
            fill="none" stroke="#2E3D1E" stroke-width="1.3" stroke-linecap="round" opacity="0.42"/>
      <path d="M-14,-32 C-22,-38 -28,-30" fill="none" stroke="#2E3D1E" stroke-width="0.9" stroke-linecap="round" opacity="0.28"/>
      <path d="M-18,-50 C-26,-56 -32,-48" fill="none" stroke="#2E3D1E" stroke-width="0.9" stroke-linecap="round" opacity="0.24"/>
      <path d="M-22,-68 C-30,-72 -34,-66" fill="none" stroke="#2E3D1E" stroke-width="0.9" stroke-linecap="round" opacity="0.2"/>
      <path d="M-4,-20 C4,-26 10,-18" fill="none" stroke="#2E3D1E" stroke-width="0.8" stroke-linecap="round" opacity="0.2"/>
      <path d="M-8,-40 C-2,-46 6,-38" fill="none" stroke="#2E3D1E" stroke-width="0.8" stroke-linecap="round" opacity="0.18"/>
    </g>

    <!-- LEAF 2: Terracotta — right (narrowed to match visual weight) -->
    <g transform="rotate(90, 0, 0)">
      <path d="M0,-4
               C-7,-20 -16,-50 -20,-76
               C-24,-94 -24,-116 -20,-132
               C-16,-144 -10,-148 -4,-142
               C2,-136 6,-122 8,-106
               C12,-84 14,-58 12,-38
               C10,-22 6,-10 0,-4Z"
            fill="#D05E3A"/>
      <path d="M-1,-12 C-5,-32 -12,-62 -16,-88 C-20,-104 -20,-122 -16,-136"
            fill="none" stroke="#A84A2C" stroke-width="1.3" stroke-linecap="round" opacity="0.38"/>
      <path d="M-6,-32 C-12,-38 -18,-30" fill="none" stroke="#A84A2C" stroke-width="0.9" stroke-linecap="round" opacity="0.26"/>
      <path d="M-10,-50 C-16,-56 -20,-48" fill="none" stroke="#A84A2C" stroke-width="0.9" stroke-linecap="round" opacity="0.22"/>
      <path d="M-12,-66 C-18,-70 -22,-64" fill="none" stroke="#A84A2C" stroke-width="0.9" stroke-linecap="round" opacity="0.18"/>
      <path d="M-1,-22 C4,-26 8,-20" fill="none" stroke="#A84A2C" stroke-width="0.8" stroke-linecap="round" opacity="0.18"/>
      <path d="M-4,-40 C2,-46 6,-38" fill="none" stroke="#A84A2C" stroke-width="0.8" stroke-linecap="round" opacity="0.16"/>
    </g>

    <!-- LEAF 3: Amber — lower-left -->
    <g transform="rotate(210, 0, 0)">
      <path d="M0,-4
               C-12,-18 -26,-48 -32,-76
               C-36,-94 -36,-116 -30,-132
               C-24,-144 -16,-148 -8,-142
               C0,-136 6,-122 10,-106
               C16,-84 18,-58 14,-36
               C10,-20 6,-10 0,-4Z"
            fill="#D4A130"/>
      <path d="M-2,-12 C-10,-30 -22,-60 -28,-86 C-32,-102 -32,-120 -26,-134"
            fill="none" stroke="#B08424" stroke-width="1.3" stroke-linecap="round" opacity="0.38"/>
      <path d="M-14,-32 C-22,-38 -28,-30" fill="none" stroke="#B08424" stroke-width="0.9" stroke-linecap="round" opacity="0.26"/>
      <path d="M-18,-50 C-26,-56 -30,-48" fill="none" stroke="#B08424" stroke-width="0.9" stroke-linecap="round" opacity="0.22"/>
      <path d="M-22,-66 C-28,-70 -32,-64" fill="none" stroke="#B08424" stroke-width="0.9" stroke-linecap="round" opacity="0.18"/>
      <path d="M-4,-20 C2,-24 8,-18" fill="none" stroke="#B08424" stroke-width="0.8" stroke-linecap="round" opacity="0.18"/>
      <path d="M-8,-38 C-2,-44 6,-36" fill="none" stroke="#B08424" stroke-width="0.8" stroke-linecap="round" opacity="0.16"/>
    </g>

    <!-- Soft center accent -->
    <circle cx="0" cy="0" r="4" fill="#2C1D10" opacity="0.06"/>

  </g>

  <!-- === WORDMARK: "We The Farm" === -->
  <g id="wordmark">
    <text x="348" y="270"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="80"
          font-weight="bold"
          fill="#2C1D10"
          letter-spacing="1.5">We The Farm</text>
  </g>

  <!-- === TAGLINE: "Compost. Grow. Share." === -->
  <g id="tagline">
    <text x="352" y="306"
          font-family="Helvetica, Arial, sans-serif"
          font-size="20"
          font-weight="normal"
          fill="#D05E3A"
          letter-spacing="4.5">Compost. Grow. Share.</text>
  </g>

</svg>